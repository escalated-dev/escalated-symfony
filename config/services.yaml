services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false

    # Auto-tag host-defined ticket action services so the registry can collect them.
    _instanceof:
        Escalated\Symfony\Contract\TicketActionInterface:
            tags: ['escalated.ticket_action']

    # Auto-register everything under the bundle's src tree. Individual services
    # below override arguments / tags where needed; this resource catches the
    # rest (notably every class under Service/, Serializer/, Security/,
    # EventSubscriber/, Repository/, Command/, Controller/ that otherwise
    # wouldn't be registered and that the bundle depends on internally).
    Escalated\Symfony\:
        resource: '../src/'
        exclude:
            - '../src/Entity/'
            - '../src/DependencyInjection/'
            - '../src/EscalatedBundle.php'
            # Plain config wrapper, instantiated by the registry — not a service.
            - '../src/Support/ArrayTicketAction.php'

    # Repositories (override to attach the Doctrine tag)
    Escalated\Symfony\Repository\TicketRepository:
        tags: ['doctrine.repository_service']

    Escalated\Symfony\Repository\DepartmentRepository:
        tags: ['doctrine.repository_service']

    Escalated\Symfony\Repository\EscalatedSettingRepository:
        tags: ['doctrine.repository_service']

    # Custom ticket action registry: tagged services + config-defined actions
    Escalated\Symfony\Service\TicketActionRegistry:
        arguments:
            $taggedActions: !tagged_iterator escalated.ticket_action
            $configActions: '%escalated.ticket_actions%'

    # SlaService needs parameter injection
    Escalated\Symfony\Service\SlaService:
        arguments:
            $slaEnabled: '%escalated.sla.enabled%'
            $businessHoursOnly: '%escalated.sla.business_hours_only%'
            $businessHours: '%escalated.sla.business_hours%'

    Escalated\Symfony\Service\Newsletter\NewsletterDispatcher:
        arguments:
            $enabled: '%escalated.enable_newsletters%'
            $batchSize: '%escalated.newsletters.batch_size%'
            $claimTimeoutMinutes: '%escalated.newsletters.claim_timeout_minutes%'
            $autoPauseBounceRate: '%escalated.newsletters.auto_pause_bounce_rate%'
            $autoPauseThreshold: '%escalated.newsletters.auto_pause_threshold%'

    Escalated\Symfony\Service\Newsletter\NewsletterRenderer:
        arguments:
            $baseUrl: '%escalated.newsletters.base_url%'
            $defaultTheme: '%escalated.newsletters.default_theme%'
            $trackingEnabled: '%escalated.newsletters.tracking_enabled%'
            $brand:
                accent: '%escalated.newsletters.brand_accent%'
                logo_url: '%escalated.newsletters.brand_logo_url%'
                physical_address: '%escalated.newsletters.brand_physical_address%'

    # UI Rendering
    Escalated\Symfony\Rendering\UiRendererInterface:
        class: Escalated\Symfony\Rendering\InertiaUiRenderer

    Escalated\Symfony\Rendering\InertiaUiRenderer: ~

    # Security Voters
    Escalated\Symfony\Security\EnsureAgentVoter:
        tags: ['security.voter']

    Escalated\Symfony\Security\EnsureAdminVoter:
        tags: ['security.voter']

    Escalated\Symfony\Security\NewsletterPermissionVoter:
        tags: ['security.voter']

    # Commands
    Escalated\Symfony\Command\WakeSnoozedTicketsCommand:
        tags: ['console.command']

    Escalated\Symfony\Command\DispatchNewslettersCommand:
        arguments:
            $enabled: '%escalated.enable_newsletters%'
        tags: ['console.command']

    # Event Subscribers
    Escalated\Symfony\Security\KnowledgeBaseGuard:
        tags:
            - { name: kernel.event_listener, event: kernel.request, priority: 10 }
    Escalated\Symfony\EventSubscriber\InertiaDataSubscriber:
        arguments:
            $routePrefix: '%escalated.route_prefix%'
            $newslettersEnabled: '%escalated.enable_newsletters%'
        tags: ['kernel.event_subscriber']

    # Serializer Normalizers
    Escalated\Symfony\Serializer\AttachmentNormalizer:
        arguments:
            $baseStorageUrl: '%escalated.storage.base_url%'
        tags: ['serializer.normalizer']

    Escalated\Symfony\Serializer\TicketNormalizer:
        arguments:
            $ticketSubjectService: '@Escalated\Symfony\Service\TicketSubjectService'
        tags: ['serializer.normalizer']

    Escalated\Symfony\Service\TicketSubjectService:
        arguments:
            $allowedTypes: '%escalated.ticket_subjects.types%'
            $resolver: '@?escalated.ticket_subject_resolver'

    # Controllers
    Escalated\Symfony\Controller\Customer\TicketController:
        arguments:
            $allowCustomerClose: '%escalated.tickets.allow_customer_close%'
        tags: ['controller.service_arguments']

    Escalated\Symfony\Controller\Agent\DashboardController:
        tags: ['controller.service_arguments']

    Escalated\Symfony\Controller\Agent\TicketController:
        tags: ['controller.service_arguments']

    Escalated\Symfony\Controller\Agent\TicketSplitController:
        tags: ['controller.service_arguments']

    Escalated\Symfony\Controller\Admin\TicketController:
        tags: ['controller.service_arguments']

    Escalated\Symfony\Controller\Admin\DepartmentController:
        tags: ['controller.service_arguments']

    Escalated\Symfony\Controller\Admin\SettingsController:
        tags: ['controller.service_arguments']

    Escalated\Symfony\Controller\Admin\PublicTicketsSettingsController:
        tags: ['controller.service_arguments']

    Escalated\Symfony\Controller\Admin\TagController:
        tags: ['controller.service_arguments']

    Escalated\Symfony\Controller\Admin\UserController:
        arguments:
            $userClass: '%escalated.user_class%'
        tags: ['controller.service_arguments']

    Escalated\Symfony\Controller\Admin\SkillController:
        tags: ['controller.service_arguments']

    Escalated\Symfony\Controller\Newsletter\Admin\NewsletterController:
        arguments:
            $defaultFrom: '%escalated.newsletters.default_from%'
            $defaultReplyTo: '%escalated.newsletters.default_reply_to%'
            $defaultTheme: '%escalated.newsletters.default_theme%'
        tags: ['controller.service_arguments']

    Escalated\Symfony\Controller\Newsletter\Admin\NewsletterListController:
        tags: ['controller.service_arguments']

    Escalated\Symfony\Controller\Newsletter\Admin\NewsletterTemplateController:
        tags: ['controller.service_arguments']

    Escalated\Symfony\Controller\Newsletter\Admin\NewsletterSettingsController:
        arguments:
            $defaults:
                default_from: '%escalated.newsletters.default_from%'
                default_reply_to: '%escalated.newsletters.default_reply_to%'
                default_theme: '%escalated.newsletters.default_theme%'
                rate_limit_per_minute: '%escalated.newsletters.rate_limit_per_minute%'
                batch_size: '%escalated.newsletters.batch_size%'
                tracking_enabled: '%escalated.newsletters.tracking_enabled%'
        tags: ['controller.service_arguments']

    Escalated\Symfony\Controller\Newsletter\Public\NewsletterTrackingController:
        arguments:
            $enabled: '%escalated.enable_newsletters%'
        tags: ['controller.service_arguments']

    Escalated\Symfony\Controller\Newsletter\Public\NewsletterUnsubscribeController:
        arguments:
            $enabled: '%escalated.enable_newsletters%'
        tags: ['controller.service_arguments']

    Escalated\Symfony\Controller\Newsletter\Public\NewsletterViewInBrowserController:
        arguments:
            $enabled: '%escalated.enable_newsletters%'
        tags: ['controller.service_arguments']

    Escalated\Symfony\Controller\Newsletter\Webhook\NewsletterEspWebhookController:
        arguments:
            $enabled: '%escalated.enable_newsletters%'
        tags: ['controller.service_arguments']

    Escalated\Symfony\Service\SkillService:
        arguments:
            $userClass: '%escalated.user_class%'

    Escalated\Symfony\Controller\Api\TicketController:
        tags: ['controller.service_arguments']

    Escalated\Symfony\Controller\Api\TicketSubjectController:
        tags: ['controller.service_arguments']

    Escalated\Symfony\Controller\Agent\TicketSubjectController:
        tags: ['controller.service_arguments']

    Escalated\Symfony\Controller\Api\AuthController:
        tags: ['controller.service_arguments']
