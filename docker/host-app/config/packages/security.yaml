security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    role_hierarchy:
        ROLE_ESCALATED_ADMIN: [ROLE_ESCALATED_AGENT, ROLE_USER]
        ROLE_ESCALATED_AGENT: [ROLE_USER]

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
            provider: app_user_provider

    access_control:
        - { path: ^/demo, roles: PUBLIC_ACCESS }
        - { path: ^/, roles: PUBLIC_ACCESS }
