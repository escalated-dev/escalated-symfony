name: escalated-symfony-demo

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      APP_ENV: demo
      APP_SECRET: demo-only-secret-not-for-production
      DATABASE_URL: "postgresql://escalated:escalated@db:5432/escalated?serverVersion=16&charset=utf8"
      MAILER_DSN: "smtp://mailpit:1025"
      TRUSTED_PROXIES: "127.0.0.1,REMOTE_ADDR"
      APP_DEBUG: "1"
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: escalated
      POSTGRES_USER: escalated
      POSTGRES_PASSWORD: escalated
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U escalated -d escalated"]
      interval: 2s
      timeout: 2s
      retries: 15

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${MAILPIT_PORT:-8025}:8025"
